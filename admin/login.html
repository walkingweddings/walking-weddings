<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Walking Weddings Journal Creator</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="icon" href="../assets/images/logo/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=PT+Sans:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet">
</head>
<body class="admin-body admin-login-body">

  <main class="admin-login">
    <div class="admin-login__card">
      <div class="admin-login__brand">
        <img src="../assets/images/logo/ww_logoWhite_wtagline.svg" alt="Walking Weddings">
      </div>
      <p class="admin-login__eyebrow">Journal Creator</p>
      <h1 class="admin-login__title">Willkommen zurück</h1>
      <p class="admin-login__sub">Bitte meldet euch an, um neue Journal-Einträge zu erstellen.</p>

      <form id="loginForm" class="admin-form" autocomplete="on">
        <label class="admin-field">
          <span>Email</span>
          <input type="email" name="email" id="email" required autocomplete="username" placeholder="contact@walkingweddings.com">
        </label>
        <label class="admin-field">
          <span>Passwort</span>
          <input type="password" name="password" id="password" required autocomplete="current-password" placeholder="••••••••">
        </label>
        <button type="submit" class="admin-btn admin-btn--primary" id="loginBtn">Einloggen</button>
        <p class="admin-error" id="loginError" hidden></p>
      </form>

      <p class="admin-login__footer">
        <a href="../index.html">← Zurück zur Website</a>
      </p>
    </div>
  </main>

  <script>
    // If already logged in, skip login
    if (localStorage.getItem('ww_admin_token')) {
      fetch('/api/admin/me', {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('ww_admin_token') }
      }).then(r => {
        if (r.ok) window.location.href = '/admin/';
      });
    }

    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.hidden = true;
      btn.disabled = true;
      btn.textContent = 'Wird geprüft…';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'Login fehlgeschlagen');
        localStorage.setItem('ww_admin_token', data.token);
        window.location.href = '/admin/';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.hidden = false;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Einloggen';
      }
    });
  </script>
</body>
</html>
